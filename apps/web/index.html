<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lab Management System</title>
    <script>
      if (location.pathname === "/login") {
        document.documentElement.dataset.authScreen = "true"
      }
    </script>
    <style>
      html,
      body,
      #root {
        min-height: 100%;
        margin: 0;
        background: oklch(0.976 0.006 230);
      }

      html[data-auth-screen="true"],
      html[data-auth-screen="true"] body,
      html[data-auth-screen="true"] #root {
        background: #07100f;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
